kind = "web"
previewPath = "/"
title = "GlobeWatch360"
version = "1.0.0"
id = "artifacts/globewatch360"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23480
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/globewatch360 run dev"

[services.env]
PORT = "23480"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/globewatch360", "run", "build"]
publicDir = "artifacts/globewatch360/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
